version: '3.8'

services:
  imagetools:
    image: yourusername/imagetools:latest
    # Or build locally:
    # build: ../../..
    container_name: imagetools-app
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8081
      - SESSION_EXPIRY_DAYS=7
      - MAX_IMAGES_PER_SESSION=5
      - MAX_UPLOAD_SIZE_MB=20
      # Internal auth is DISABLED for Simplified variant
      - REQUIRE_INTERNAL_AUTH=false
    volumes:
      - imagetools-storage:/app/storage
    networks:
      - traefik-network  # ← Replace with your Traefik network name
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8081/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Web router - requires Authelia authentication
      - "traefik.enable=true"
      - "traefik.http.routers.imagetools-web.rule=Host(`imagetools.yourdomain.com`)"  # ← Replace with your domain
      - "traefik.http.routers.imagetools-web.entrypoints=https"
      - "traefik.http.routers.imagetools-web.tls=true"
      - "traefik.http.routers.imagetools-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.imagetools-web.middlewares=authelia@docker"  # ← Replace with your Authelia middleware
      - "traefik.http.routers.imagetools-web.service=imagetools-svc"
      - "traefik.http.routers.imagetools-web.priority=1"
      
      # Mobile API router - bypasses Authelia, uses app-level auth
      - "traefik.http.routers.imagetools-api-mobile.rule=Host(`imagetools.yourdomain.com`) && PathPrefix(`/api/v1/mobile`)"  # ← Replace domain
      - "traefik.http.routers.imagetools-api-mobile.entrypoints=https"
      - "traefik.http.routers.imagetools-api-mobile.tls=true"
      - "traefik.http.routers.imagetools-api-mobile.tls.certresolver=letsencrypt"
      - "traefik.http.routers.imagetools-api-mobile.service=imagetools-svc"
      - "traefik.http.routers.imagetools-api-mobile.priority=100"
      # No middleware = bypasses Authelia
      
      # Addon API router - bypasses Authelia, uses app-level auth
      - "traefik.http.routers.imagetools-api-addon.rule=Host(`imagetools.yourdomain.com`) && PathPrefix(`/api/v1/addon`)"  # ← Replace domain
      - "traefik.http.routers.imagetools-api-addon.entrypoints=https"
      - "traefik.http.routers.imagetools-api-addon.tls=true"
      - "traefik.http.routers.imagetools-api-addon.tls.certresolver=letsencrypt"
      - "traefik.http.routers.imagetools-api-addon.service=imagetools-svc"
      - "traefik.http.routers.imagetools-api-addon.priority=100"
      # No middleware = bypasses Authelia

      # Share viewer + raw bytes - bypasses Authelia (5-min ephemeral tokens)
      - "traefik.http.routers.imagetools-share.rule=Host(`imagetools.yourdomain.com`) && PathPrefix(`/s`)"  # ← Replace domain
      - "traefik.http.routers.imagetools-share.entrypoints=https"
      - "traefik.http.routers.imagetools-share.tls=true"
      - "traefik.http.routers.imagetools-share.tls.certresolver=letsencrypt"
      - "traefik.http.routers.imagetools-share.service=imagetools-svc"
      - "traefik.http.routers.imagetools-share.priority=100"
      # No middleware = bypasses Authelia

      # Presigned image URLs - bypasses Authelia (HMAC-signed, per-image pepper)
      - "traefik.http.routers.imagetools-presigned.rule=Host(`imagetools.yourdomain.com`) && PathPrefix(`/i`)"  # ← Replace domain
      - "traefik.http.routers.imagetools-presigned.entrypoints=https"
      - "traefik.http.routers.imagetools-presigned.tls=true"
      - "traefik.http.routers.imagetools-presigned.tls.certresolver=letsencrypt"
      - "traefik.http.routers.imagetools-presigned.service=imagetools-svc"
      - "traefik.http.routers.imagetools-presigned.priority=100"
      # No middleware = bypasses Authelia

      # Privacy policy - bypasses Authelia (public document required by browser-extension store listings)
      - "traefik.http.routers.imagetools-privacy.rule=Host(`imagetools.yourdomain.com`) && Path(`/privacy.html`)"  # ← Replace domain
      - "traefik.http.routers.imagetools-privacy.entrypoints=https"
      - "traefik.http.routers.imagetools-privacy.tls=true"
      - "traefik.http.routers.imagetools-privacy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.imagetools-privacy.service=imagetools-svc"
      - "traefik.http.routers.imagetools-privacy.priority=100"
      # No middleware = bypasses Authelia

      # Service definition
      - "traefik.http.services.imagetools-svc.loadbalancer.server.port=8081"

networks:
  traefik-network:  # ← Replace with your Traefik network name
    external: true

volumes:
  imagetools-storage:
    driver: local
